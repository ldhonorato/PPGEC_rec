services:
  web:
    build: .
    container_name: ppgec_web
    command: gunicorn ppgec.wsgi:application --bind 0.0.0.0:8000 --workers 3
    ports:
      - 8001:8000
    volumes:
      - .:/app
    env_file:
      - .env
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    depends_on:
      - redis
    restart: unless-stopped

  celery:
    build: .
    container_name: ppgec_celery
    command: celery -A ppgec worker --loglevel=info
    volumes:
      - .:/app
    env_file:
      - .env
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    depends_on:
      - redis
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: ppgec_redis
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  redis_data:
