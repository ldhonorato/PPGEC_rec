x-watchtower-enabled: &watchtower-enabled
  com.centurylinklabs.watchtower.enable: "true"

x-watchtower-disabled: &watchtower-disabled
  com.centurylinklabs.watchtower.enable: "false"

services:
  db:
    image: postgres:16-alpine
    container_name: ppgec_db
    labels: *watchtower-disabled
    env_file:
      - .env
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-ppgec}
      - POSTGRES_USER=${POSTGRES_USER:-ppgec}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ppgec} -d ${POSTGRES_DB:-ppgec}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  pgadmin:
    image: dpage/pgadmin4:8
    container_name: ppgec_pgadmin
    labels: *watchtower-disabled
    env_file:
      - .env
    environment:
      - PGADMIN_DEFAULT_EMAIL=${PGADMIN_DEFAULT_EMAIL:-admin@ppgec.local}
      - PGADMIN_DEFAULT_PASSWORD=${PGADMIN_DEFAULT_PASSWORD:-ppgec_pgadmin_password}
    ports:
      - "127.0.0.1:${PGADMIN_PORT:-5050}:80"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    restart: unless-stopped

  web:
    image: ghcr.io/ldhonorato/ppgec_rec:latest
    container_name: ppgec_web
    command: gunicorn ppgec.wsgi:application --bind 0.0.0.0:8001 --workers 3
    labels: *watchtower-enabled
    ports:
      - "${WEB_PORT:-8001}:8001"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  celery:
    image: ghcr.io/ldhonorato/ppgec_rec:latest
    container_name: ppgec_celery
    command: celery -A ppgec worker --loglevel=info
    labels: *watchtower-enabled
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  celery-beat:
    image: ghcr.io/ldhonorato/ppgec_rec:latest
    container_name: ppgec_celery_beat
    command: celery -A ppgec beat --loglevel=info
    labels: *watchtower-enabled
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: ppgec_redis
    labels: *watchtower-disabled
    volumes:
      - redis_data:/data
    restart: unless-stopped

  watchtower:
    image: containrrr/watchtower:1.7.1
    container_name: ppgec_watchtower
    labels: *watchtower-disabled
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - WATCHTOWER_LABEL_ENABLE=true
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_POLL_INTERVAL=${WATCHTOWER_POLL_INTERVAL:-300}
    restart: unless-stopped

volumes:
  postgres_data:
  pgadmin_data:
  redis_data:
