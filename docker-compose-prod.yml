services:
  db:
    image: postgres:16-alpine
    container_name: ppgec_db
    env_file:
      - .env
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-ppgec}
      - POSTGRES_USER=${POSTGRES_USER:-ppgec}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ppgec} -d ${POSTGRES_DB:-ppgec}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  pgadmin:
    image: dpage/pgadmin4:8
    container_name: ppgec_pgadmin
    env_file:
      - .env
    environment:
      - PGADMIN_DEFAULT_EMAIL=${PGADMIN_DEFAULT_EMAIL:-admin@ppgec.local}
      - PGADMIN_DEFAULT_PASSWORD=${PGADMIN_DEFAULT_PASSWORD:-ppgec_pgadmin_password}
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    restart: unless-stopped

  web:
    image: ghcr.io/ldhonorato/ppgec_rec:latest
    container_name: ppgec_web
    command: gunicorn ppgec.wsgi:application --bind 0.0.0.0:8001 --workers 3
    ports:
      - "${WEB_PORT:-8001}:8001"
    env_file:
      - .env
    environment:
      - USE_POSTGRES=true
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  celery:
    image: ghcr.io/ldhonorato/ppgec_rec:latest
    container_name: ppgec_celery
    command: celery -A ppgec worker --loglevel=info
    env_file:
      - .env
    environment:
      - USE_POSTGRES=true
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  celery-beat:
    image: ghcr.io/ldhonorato/ppgec_rec:latest
    container_name: ppgec_celery_beat
    command: celery -A ppgec beat --loglevel=info
    env_file:
      - .env
    environment:
      - USE_POSTGRES=true
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: ppgec_redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  postgres_data:
  pgadmin_data:
  redis_data:
