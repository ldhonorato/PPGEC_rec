{% extends "base.html" %}
{% load static %}
{% block title %}Cadastro enviado | AcadFlow{% endblock %}
{% block content %}
<section class="login-page">
    <article class="card login-card">
        <div class="login-brand">
            <img src="{% static 'img/acadflow-logo.png' %}" alt="AcadFlow">
            <div>
                <h1 class="section-title">Cadastro enviado</h1>
                <p class="muted">Seu cadastro foi recebido e ficara em avaliacao pela secretaria.</p>
            </div>
        </div>
        <a class="btn btn-full" href="{% url 'login' %}">Voltar para o login</a>
    </article>
</section>
{% endblock %}
